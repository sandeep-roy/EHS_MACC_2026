<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial;
    }
    #svg { position: absolute; width: 100%; height: 100%; }

    #tooltip {
      position: absolute;
      background: rgba(0,0,0,.85);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      max-width: 350px;
      line-height: 1.2em;
      z-index: 100;
    }

    #zoom-controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 200;
    }
    #zoom-controls button {
      background: #fff;
      border: 1px solid #444;
      border-radius: 5px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }
    #zoom-controls button:hover { background: #e5e5e5; }
  </style>
</head>

<body>

<div id="zoom-controls">
  <button id="zoom-in">+</button>
  <button id="zoom-out">-</button>
  <button id="zoom-reset">⟳</button>
</div>

<div id="tooltip"></div>
<svg id="svg"></svg>

<script type="module">
  import { initMACC } from "./src/main.js";
  initMACC();
</script>

</body>
</html>
