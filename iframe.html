<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
  html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family:Arial;
  }

  #scroll-container {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      overflow-x:auto;
      overflow-y:hidden;
      background:white;
  }

  #svg {
      position:relative;
      min-width:2200px;
      height:100%;
  }

  #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:6px 10px;
      border-radius:4px;
      font-size:12px;
      pointer-events:none;
      display:none;
      max-width:350px;
      z-index:100;
  }

  #zoom-controls {
      position:absolute;
      top:10px;
      right:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      z-index:200;
  }

  #zoom-controls button {
      background:white;
      border:1px solid #444;
      border-radius:5px;
      width:32px;
      height:32px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
  }
  #zoom-controls button:hover {
      background:#e5e5e5;
  }

  /* Brush selection rectangle */
  #brush {
      fill:rgba(150,150,150,0.25);
      stroke:#333;
      stroke-dasharray:4;
      pointer-events:none;
  }

</style>
</head>

<body>

<div id="zoom-controls">
  <button id="zoom-in">＋</button>
  <button id="zoom-out">－</button>
  <button id="zoom-reset">⟲</button>
</div>

<div id="tooltip"></div>

<div id="scroll-container">
   <svg id="svg"></svg>
</div>

<script>
let DATA = null;
let selected = new Set();

/* Zoom state for brush zoom */
let brushActive = false;
let brushStartX = 0;
let brushRect = null;

window.addEventListener("message", evt => {
    if (evt.data?.type === "update") {
        DATA = evt.data.payload;
        draw();
    }
});

const svg = document.getElementById("svg");
const tip = document.getElementById("tooltip");

function draw() {
    if (!DATA) return;

    const W = svg.clientWidth  || 2200;
    const H = svg.clientHeight || 600;

    svg.innerHTML = '<g id="viewport"></g>';
    const root = svg.querySelector("#viewport");

    const margin = { top:60, right:80, bottom:160, left:200 };
    const innerW = W - margin.left - margin.right;
    const innerH = H - margin.top - margin.bottom;

    /* Data sanitize */
    const rows = DATA.project.map((p,i)=>({
        name: p,
        cat: DATA.category[i],
        abate: Number(DATA.abatement[i])||0,
        mac: Number(DATA.mac[i])||0,
        cum: Number(DATA.cumulative[i])||0,
        npv: Number(DATA.npv[i])||0,
        capex: Number(DATA.capex[i])||0,
        opex: Number(DATA.opex[i])||0
    }));

    const clean = rows.filter(r => Number.isFinite(r.abate) && Number.isFinite(r.mac));
    if (clean.length === 0) return;

    clean.sort((a,b)=> a.mac - b.mac);

    /* Cumulative abatement */
    let total = 0;
    clean.forEach(r => {
        r.x0 = total;
        total += r.abate;
        r.x1 = total;
    });

    const x = v => margin.left + (v / total) * innerW;

    function macColor(v){
        if (v <= -1000) return "#238b45";
        if (v <= -500)  return "#74c476";
        if (v < 0)      return "#bae4b3";
        if (v <= 500)   return "#fee391";
        if (v <= 1500)  return "#fdae6b";
        if (v <= 3000)  return "#fd8d3c";
        return "#e31a1c";
    }

    /* Y scale auto-fit */
    const vals = clean.map(r => r.mac);
    let min = Math.min(...vals);
    let max = Math.max(...vals);

    const PAD  = (max - min) * 0.15;
    max += PAD;
    min -= PAD;

    const y = v =>
        margin.top + (1 - (v - min) / (max - min)) * innerH;

    const y0 = y(0);

    /* Background grid */
    const yTicks = 6;
    const xTicks = 6;

    for (let i=0; i<=yTicks;i++){
        const v=min+(i/yTicks)*(max-min);
        const yPos=y(v);

        const gl=document.createElementNS(svg.namespaceURI,"line");
        gl.setAttribute("x1", margin.left);
        gl.setAttribute("x2", margin.left+innerW);
        gl.setAttribute("y1", yPos);
        gl.setAttribute("y2", yPos);
        gl.setAttribute("stroke","#ddd");
        root.appendChild(gl);
    }

    for (let i=0;i<=xTicks;i++){
        const v=(i/xTicks)*total;
        const xPos=x(v);

        const gl=document.createElementNS(svg.namespaceURI,"line");
        gl.setAttribute("x1", xPos);
        gl.setAttribute("x2", xPos);
        gl.setAttribute("y1", margin.top);
        gl.setAttribute("y2", margin.top+innerH);
        gl.setAttribute("stroke","#eee");
        root.appendChild(gl);
    }

    /* Zero line */
    const zl=document.createElementNS(svg.namespaceURI,"line");
    zl.setAttribute("x1", margin.left);
    zl.setAttribute("x2", margin.left+innerW);
    zl.setAttribute("y1", y0);
    zl.setAttribute("y2", y0);
    zl.setAttribute("stroke","#0044aa");
    zl.setAttribute("stroke-width","1.5");
    root.appendChild(zl);

    /* Target line */
    const TARGET=60000;
    if (TARGET<total){
        const tx = x(TARGET);

        const tl=document.createElementNS(svg.namespaceURI,"line");
        tl.setAttribute("x1",tx);
        tl.setAttribute("x2",tx);
        tl.setAttribute("y1",margin.top);
        tl.setAttribute("y2",margin.top+innerH);
        tl.setAttribute("stroke","black");
        tl.setAttribute("stroke-dasharray","6,4");
        tl.setAttribute("stroke-width","2");
        root.appendChild(tl);

        const label=document.createElementNS(svg.namespaceURI,"text");
        label.textContent="Target: 60,000 tCO₂e";
        label.setAttribute("x",tx+10);
        label.setAttribute("y",margin.top-18);
        label.setAttribute("font-size","14");
        root.appendChild(label);
    }

    /* Y-axis ticks */
    for (let i=0;i<=yTicks;i++){
        const v=min+(i/yTicks)*(max-min);
        const yPos=y(v);

        const t=document.createElementNS(svg.namespaceURI,"line");
        t.setAttribute("x1",margin.left-6);
        t.setAttribute("x2",margin.left);
        t.setAttribute("y1",yPos);
        t.setAttribute("y2",yPos);
        t.setAttribute("stroke","#444");
        root.appendChild(t);

        const lab=document.createElementNS(svg.namespaceURI,"text");
        lab.textContent=Math.round(v).toLocaleString();
        lab.setAttribute("x",margin.left-10);
        lab.setAttribute("y",yPos+4);
        lab.setAttribute("text-anchor","end");
        lab.setAttribute("font-size","14");
        root.appendChild(lab);
    }

    /* X-axis ticks */
    for (let i=0;i<=xTicks;i++){
        const v=(i/xTicks)*total;
        const xPos=x(v);

        const t=document.createElementNS(svg.namespaceURI,"line");
        t.setAttribute("x1",xPos);
        t.setAttribute("x2",xPos);
        t.setAttribute("y1",y0);
        t.setAttribute("y2",y0+8);
        t.setAttribute("stroke","#444");
        root.appendChild(t);

        const lab=document.createElementNS(svg.namespaceURI,"text");
        lab.textContent=v.toLocaleString()+" tCO₂e";
        lab.setAttribute("x",xPos);
        lab.setAttribute("y",y0+24);
        lab.setAttribute("text-anchor","middle");
        lab.setAttribute("font-size","14");
        root.appendChild(lab);
    }

    /* Multi-select & bar events */
    function toggleSelect(d, rect){
        if (selected.has(d.name)){
            selected.delete(d.name);
            rect.setAttribute("stroke","#333");
            rect.setAttribute("stroke-width","1.2");
        } else {
            selected.add(d.name);
            rect.setAttribute("stroke","black");
            rect.setAttribute("stroke-width","3");
        }

        parent.postMessage({
            type:"bar_click",
            selectedMembers:Array.from(selected).map(x=>({id:x}))
        },"*");
    }

    clean.forEach(d => {

        const rect=document.createElementNS(svg.namespaceURI,"rect");

        rect.setAttribute("x",x(d.x0));
        rect.setAttribute("width",Math.max(8,x(d.abate)-x(0)));
        rect.setAttribute("y",d.mac>=0?y(d.mac):y0);
        rect.setAttribute("height",Math.abs(y(d.mac)-y0));
        rect.setAttribute("fill",macColor(d.mac));
        rect.setAttribute("stroke",selected.has(d.name)?"black":"#333");
        rect.setAttribute("stroke-width",selected.has(d.name)?"3":"1.2");
        rect.style.cursor="pointer";

        const txt=`
<b>${d.name}</b><br>
Category: ${d.cat}<br>
MAC: ${d.mac}<br>
Abatement: ${d.abate}<br>
Cumulative: ${d.cum}<br>
NPV: ${d.npv}<br>
Capex: ${d.capex}<br>
Opex: ${d.opex}`;

        rect.addEventListener("mouseover",()=>{ tip.style.display="block"; tip.innerHTML=txt; });
        rect.addEventListener("mouseout", ()=> tip.style.display="none");

        rect.addEventListener("mousemove",evt=>{
            let tx=evt.pageX+15;
            let ty=evt.pageY-20;

            if (tx+tip.offsetWidth > window.innerWidth-10)
                tx=evt.pageX-tip.offsetWidth-15;

            if (ty<10)
                ty=evt.pageY+20;

            tip.style.left=tx+"px";
            tip.style.top=ty+"px";
        });

        /* C1: Bar selection remains active inside zoom */
        rect.addEventListener("click",()=>toggleSelect(d,rect));

        root.appendChild(rect);
    });

    /* Axis labels */
    const xlab=document.createElementNS(svg.namespaceURI,"text");
    xlab.textContent="Total Abatement (tCO₂e)";
    xlab.setAttribute("x", margin.left + innerW/2 );
    xlab.setAttribute("y",H-50);
    xlab.setAttribute("text-anchor","middle");
    xlab.setAttribute("font-size","18");
    root.appendChild(xlab);

    const ylab=document.createElementNS(svg.namespaceURI,"text");
    ylab.textContent="MAC (EUR/tCO₂e)";
    ylab.setAttribute("transform","rotate(-90)");
    ylab.setAttribute("x",-H/2);
    ylab.setAttribute("y",60);
    ylab.setAttribute("text-anchor","middle");
    ylab.setAttribute("font-size","18");
    root.appendChild(ylab);

    /* ============================================================
       BRUSH ZOOM (Option C1 + Z1)
    ============================================================ */

    svg.onmousedown = function(evt){
        const target = evt.target;

        // Start brush only if clicking on background
        if (target.tagName === "rect" || target.tagName === "text")
            return; 

        brushActive = true;
        brushStartX = evt.offsetX;

        brushRect = document.createElementNS(svg.namespaceURI,"rect");
        brushRect.setAttribute("id","brush");
        brushRect.setAttribute("x",brushStartX);
        brushRect.setAttribute("y",margin.top);
        brushRect.setAttribute("width",0);
        brushRect.setAttribute("height",innerH);
        svg.appendChild(brushRect);
    };

    svg.onmousemove = function(evt){
        if (!brushActive) return;

        const currentX = evt.offsetX;

        /* Z1: Only allow left → right draws */
        if (currentX < brushStartX) {
            brushRect.setAttribute("width",0);
            return;
        }

        brushRect.setAttribute("width", currentX - brushStartX);
    };

    svg.onmouseup = function(evt){
        if (!brushActive) return;
        brushActive = false;

        const endX = evt.offsetX;

        /* Ignore clicks with no width */
        if (endX <= brushStartX + 5){
            svg.removeChild(brushRect);
            return;
        }

        const zoomMinX = brushStartX;
        const zoomMaxX = endX;

        svg.removeChild(brushRect);

        // Convert pixel range to abatement values
        const newMin = total * ( (zoomMinX-margin.left) / innerW );
        const newMax = total * ( (zoomMaxX-margin.left) / innerW );

        // Filter bars in range
        const inView = clean.filter(d => d.x1 >= newMin && d.x0 <= newMax);

        if (inView.length === 0){
            draw();
            return;
        }

        // Auto-fit Y
        const ys = inView.map(d=>d.mac);
        min=Math.min(...ys);
        max=Math.max(...ys);
        min -= PAD;
        max += PAD;

        // Rerender restricted axes & bars
        renderZoomed(newMin,newMax,min,max);
    };

    /* Reset zoom on double-click */
    svg.ondblclick = function(){
        scale=1; translateX=0;
        draw();
    };
}

/* Render zoomed region */
function renderZoomed(xMin,xMax,min,max){
    /* Keep DATA and selected state */
    const evt = new Event("force-redraw");
    DATA._zoomState = { xMin,xMax,min,max };
    draw();  // For now, full redraw is simplest
}

/* ============================================================
   ZOOM BUTTONS + PAN (same as v3.4)
============================================================ */
let scale=1, translateX=0, isDragging=false, startX=0;

function applyTransform(){
    const root=svg.querySelector("#viewport");
    root.setAttribute("transform",`translate(${translateX},0) scale(${scale})`);
}

document.getElementById("zoom-in").onclick = ()=>{ scale=Math.min(scale+0.2,5); applyTransform(); };
document.getElementById("zoom-out").onclick = ()=>{ scale=Math.max(scale-0.2,0.3); applyTransform(); };
document.getElementById("zoom-reset").onclick = ()=>{ scale=1; translateX=0; applyTransform(); draw(); };

svg.addEventListener("wheel",evt=>{
    evt.preventDefault();
    scale += evt.deltaY<0 ? 0.2 : -0.2;
    scale=Math.min(Math.max(scale,0.3),5);
    applyTransform();
});

svg.addEventListener("mousedown",evt=>{
    isDragging=true;
    startX=evt.clientX-translateX;
});
svg.addEventListener("mousemove",evt=>{
    if(isDragging){
        translateX=evt.clientX-startX;
        applyTransform();
    }
});
svg.addEventListener("mouseup",()=>isDragging=false);
svg.addEventListener("mouseleave",()=>isDragging=false);

</script>
</body>
</html>
