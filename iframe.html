<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
  html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family:Arial, sans-serif;
  }

  #svg {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
  }

  #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:6px 10px;
      border-radius:4px;
      font-size:12px;
      pointer-events:none;
      display:none;
      max-width:350px;
      line-height:1.2em;
      z-index:100;
  }

  #zoom-controls {
      position:absolute;
      top:10px;
      right:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      z-index:200;
  }

  #zoom-controls button {
      background:white;
      border:1px solid #444;
      border-radius:5px;
      width:32px;
      height:32px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
  }
  #zoom-controls button:hover { background:#e5e5e5; }

  #brush {
      fill:rgba(150,150,150,0.25);
      stroke:#333;
      stroke-dasharray:4;
      pointer-events:none;
  }
</style>
</head>

<body>

<div id="zoom-controls">
  <button id="zoom-in">＋</button>
  <button id="zoom-out">－</button>
  <button id="zoom-reset">⟲</button>
</div>

<div id="tooltip"></div>

<svg id="svg">
  <defs>
    <clipPath id="plotClip">
      <rect id="clipRect" x="0" y="0" width="100" height="100"></rect>
    </clipPath>
  </defs>

  <g id="gridLayer"></g>
  <g id="axisLayer"></g>
  <g id="barLayer" clip-path="url(#plotClip)"></g>
</svg>


<script>
let DATA=null;
let selected=new Set();

/* Brush */
let brushActive=false;
let brushStartX=0;
let brushRect=null;

/* Pan + zoom */
let scale=1;
let translateX=0;
let dragging=false;
let dragStartX=0;

/* Receive data from SAC */
window.addEventListener("message",evt=>{
    if(evt.data?.type==="update"){
        DATA=evt.data.payload;
        draw();
    }
});

const svg=document.getElementById("svg");
const tip=document.getElementById("tooltip");

/* ============================================================
   DRAW v3.4.4
============================================================ */
function drawXTicks() {
    const axisLayer = svg.querySelector("#axisLayer");
    axisLayer.querySelectorAll(".xtick").forEach(el => el.remove());

    const tickCount = scale <= 1 ? 6 : Math.min(6 * Math.ceil(scale), 24);

    for (let i = 0; i <= tickCount; i++) {
        const val = (i / tickCount) * totalAb;
        const pos = x(val);

        const t = document.createElementNS(svg.namespaceURI, "line");
        t.classList.add("xtick");
        t.setAttribute("x1", pos);
        t.setAttribute("x2", pos);
        t.setAttribute("y1", y0);
        t.setAttribute("y2", y0 + 8);
        t.setAttribute("stroke", "#444");
        axisLayer.appendChild(t);

        const lab = document.createElementNS(svg.namespaceURI, "text");
        lab.classList.add("xtick");
        lab.textContent = val.toLocaleString() + " tCO₂e";
        lab.setAttribute("x", pos);
        lab.setAttribute("y", y0 + 24);
        lab.setAttribute("text-anchor", "middle");
        lab.setAttribute("font-size", "14");
        axisLayer.appendChild(lab);
    }
}
drawXTicks();
  function draw(){
    if(!DATA) return;

    const W=svg.clientWidth;
    const H=svg.clientHeight;

    svg.innerHTML = `
      <g id="gridLayer"></g>
      <g id="axisLayer"></g>
      <g id="barLayer"></g>
    `;

    const gridLayer = svg.querySelector("#gridLayer");
    const axisLayer = svg.querySelector("#axisLayer");
    const barLayer  = svg.querySelector("#barLayer");

    scale=1;
    translateX=0;

    const margin={top:60,right:80,bottom:150,left:200};
    const innerW = Math.max(600, W - margin.left - margin.right);
    const innerH = H - margin.top - margin.bottom;
    svg.querySelector("#clipRect").setAttribute("x", margin.left);
svg.querySelector("#clipRect").setAttribute("y", margin.top);
svg.querySelector("#clipRect").setAttribute("width", innerW);
svg.querySelector("#clipRect").setAttribute("height", innerH);

    /* Data */
    const rows = DATA.project.map((p,i)=>({
        name:p,
        cat:DATA.category[i],
        abate:Number(DATA.abatement[i])||0,
        mac:Number(DATA.mac[i])||0,
        cum:Number(DATA.cumulative[i])||0,
        npv:Number(DATA.npv[i])||0,
        capex:Number(DATA.capex[i])||0,
        opex:Number(DATA.opex[i])||0
    }));
    const clean = rows.filter(r=>Number.isFinite(r.abate)&&Number.isFinite(r.mac));
    if(!clean.length) return;

    clean.sort((a,b)=>a.mac-b.mac);

    let totalAb = clean.reduce((s,r)=>s+r.abate,0);

    /* x0/x1 */
    let cum=0;
    clean.forEach(r=>{
        r.x0=cum;
        cum+=r.abate;
        r.x1=cum;
    });

    /* COMPACT C2 scaling */
    const scaleX = innerW / totalAb;
    const x = v => margin.left + v * scaleX;

    /* Color palette */
    const macColor=v=>{
        if(v<=-1000) return "#238b45";
        if(v<= -500) return "#74c476";
        if(v<0)      return "#bae4b3";
        if(v<= 500) return "#fee391";
        if(v<=1500) return "#fdae6b";
        if(v<=3000) return "#fd8d3c";
        return "#e31a1c";
    };

    /* Y scale */
    let minMAC=Math.min(...clean.map(r=>r.mac));
    let maxMAC=Math.max(...clean.map(r=>r.mac));
    const PAD=(maxMAC-minMAC)*0.15;
    minMAC-=PAD; maxMAC+=PAD;

    const y = val => margin.top + (1 - (val-minMAC)/(maxMAC-minMAC))*innerH;
    const y0 = y(0);

    /* Gridlines (G1: fixed, non-scaled) */
    const yTicks=6, xTicks=6;

    for(let i=0;i<=yTicks;i++){
        const v=minMAC+(i/yTicks)*(maxMAC-minMAC);
        const ypos=y(v);
        const gl=document.createElementNS(svg.namespaceURI,"line");
        gl.setAttribute("x1",margin.left);
        gl.setAttribute("x2",margin.left+innerW);
        gl.setAttribute("y1",ypos);
        gl.setAttribute("y2",ypos);
        gl.setAttribute("stroke","#ddd");
        gridLayer.appendChild(gl);
    }

    for(let i=0;i<=xTicks;i++){
        const v=(i/xTicks)*totalAb;
        const xpos=x(v);
        const gl=document.createElementNS(svg.namespaceURI,"line");
        gl.setAttribute("x1",xpos);
        gl.setAttribute("x2",xpos);
        gl.setAttribute("y1",margin.top);
        gl.setAttribute("y2",margin.top+innerH);
        gl.setAttribute("stroke","#eee");
        gridLayer.appendChild(gl);
    }

    /* Zero line */
    {
        const zl=document.createElementNS(svg.namespaceURI,"line");
        zl.setAttribute("x1",margin.left);
        zl.setAttribute("x2",margin.left+innerW);
        zl.setAttribute("y1",y0);
        zl.setAttribute("y2",y0);
        zl.setAttribute("stroke","#0044aa");
        zl.setAttribute("stroke-width","1.5");
        axisLayer.appendChild(zl);
    }

    /* Y ticks */
    for(let i=0;i<=yTicks;i++){
        const v=minMAC+(i/yTicks)*(maxMAC-minMAC);
        const pos=y(v);

        const t=document.createElementNS(svg.namespaceURI,"line");
        t.setAttribute("x1",margin.left-6);
        t.setAttribute("x2",margin.left);
        t.setAttribute("y1",pos);
        t.setAttribute("y2",pos);
        t.setAttribute("stroke","#444");
        axisLayer.appendChild(t);

        const lab=document.createElementNS(svg.namespaceURI,"text");
        lab.textContent=Math.round(v).toLocaleString();
        lab.setAttribute("x",margin.left-10);
        lab.setAttribute("y",pos+4);
        lab.setAttribute("text-anchor","end");
        lab.setAttribute("font-size","14");
        axisLayer.appendChild(lab);
    }

    /* X ticks */
    for(let i=0;i<=xTicks;i++){
        const v=(i/xTicks)*totalAb;
        const pos=x(v);

        const t=document.createElementNS(svg.namespaceURI,"line");
        t.setAttribute("x1",pos);
        t.setAttribute("x2",pos);
        t.setAttribute("y1",y0);
        t.setAttribute("y2",y0+8);
        t.setAttribute("stroke","#444");
        axisLayer.appendChild(t);

        const lab=document.createElementNS(svg.namespaceURI,"text");
        lab.textContent=v.toLocaleString()+" tCO₂e";
        lab.setAttribute("x",pos);
        lab.setAttribute("y",y0+24);
        lab.setAttribute("text-anchor","middle");
        lab.setAttribute("font-size","14");
        axisLayer.appendChild(lab);
    }

    /* Bars (zoomable layer) */
    clean.forEach(d=>{
        const barWidth = Math.max(4, (d.x1-d.x0)*scaleX);

        const rect=document.createElementNS(svg.namespaceURI,"rect");
        rect.setAttribute("x",x(d.x0));
        rect.setAttribute("width",barWidth);
        rect.setAttribute("y",d.mac>=0?y(d.mac):y0);
        rect.setAttribute("height",Math.abs(y(d.mac)-y0));

        rect.setAttribute("fill",macColor(d.mac));
        rect.setAttribute("stroke",selected.has(d.name)?"black":"#333");
        rect.setAttribute("stroke-width","1.2");
        rect.setAttribute("vector-effect","non-scaling-stroke");
        rect.style.cursor="pointer";

        let html = `
<b>${d.name}</b><br>
Category: ${d.cat}<br>
MAC: ${d.mac}<br>
Abatement: ${d.abate}<br>
Cumulative: ${d.cum}<br>
NPV: ${d.npv}<br>
Capex: ${d.capex}<br>
Opex: ${d.opex}
        `;

        rect.onmouseover=()=>{ tip.style.display="block"; tip.innerHTML=html; };
        rect.onmouseout =()=> tip.style.display="none";
        rect.onmousemove=evt=>{
            let tx=evt.clientX+15, ty=evt.clientY-20;
            if(tx+tip.offsetWidth>window.innerWidth-10)
                tx=evt.clientX-tip.offsetWidth-15;
            if(ty<10) ty=evt.clientY+20;
            tip.style.left=tx+"px";
            tip.style.top=ty+"px";
        };

        rect.onclick=()=>{
            if(selected.has(d.name)){
                selected.delete(d.name);
                rect.setAttribute("stroke","#333");
            } else {
                selected.add(d.name);
                rect.setAttribute("stroke","black");
            }

            parent.postMessage({
                type:"bar_click",
                selectedMembers:Array.from(selected).map(x=>({id:x}))
            },"*");
        };

        barLayer.appendChild(rect);
    });

    /* Axis labels (static) */
    const xlab=document.createElementNS(svg.namespaceURI,"text");
    xlab.textContent="Total Abatement (tCO₂e)";
    xlab.setAttribute("x", margin.left + innerW/2 );
    xlab.setAttribute("y", H-50);
    xlab.setAttribute("text-anchor","middle");
    xlab.setAttribute("font-size","18");
    axisLayer.appendChild(xlab);

    const ylab=document.createElementNS(svg.namespaceURI,"text");
    ylab.textContent="MAC (EUR/tCO₂e)";
    ylab.setAttribute("transform","rotate(-90)");
    ylab.setAttribute("x",-H/2);
    ylab.setAttribute("y",60);
    ylab.setAttribute("text-anchor","middle");
    ylab.setAttribute("font-size","18");
    axisLayer.appendChild(ylab);

    /* Brush zoom */
   svg.onmousedown = evt => {
    if (scale === 1) return;   // ❗ lock when zoomed out
    if (evt.target.id === "brush") return;
    if (evt.button !== 0) return;
    dragging = true;
    dragStartX = evt.clientX - translateX;
};

    svg.onmousemove=evt=>{
        if(!brushActive) return;
        const cx=evt.offsetX;
        if(cx<brushStartX){
            brushRect.setAttribute("width",0);
            return;
        }
        brushRect.setAttribute("width",cx-brushStartX);
    };

    svg.onmouseup=evt=>{
        if(!brushActive)return;
        brushActive=false;

        const end=evt.offsetX;
        svg.removeChild(brushRect);

        if(end<=brushStartX+10)return;

        const pxMin=brushStartX;
        const pxMax=end;

        const xMin = (pxMin - margin.left)/scaleX;
        const xMax = (pxMax - margin.left)/scaleX;

        const inRange = clean.filter(d=> d.x1>=xMin && d.x0<=xMax);
        if(!inRange.length){ draw(); return; }

        minMAC=Math.min(...inRange.map(d=>d.mac));
        maxMAC=Math.max(...inRange.map(d=>d.mac));
        minMAC-=PAD; maxMAC+=PAD;

        const pxRange = pxMax - pxMin;
        const z = innerW / pxRange;

        scale = Math.min(z, 5);

const cx = (pxMin + pxMax) / 2;
translateX = margin.left + innerW/2 - cx * scale;

applyTransform();
    };

    svg.ondblclick=()=>{
        scale=1;
        translateX=0;
        applyTransform();
    };
}

/* ============================================================
   APPLY TRANSFORM 
============================================================ */
function applyTransform() {
    const barLayer = svg.querySelector("#barLayer");

    // Bars zoom + translate
    barLayer.setAttribute(
        "transform",
        `translate(${translateX},0) scale(${scale},1)`
    );

    // Axis and grid remain fixed
    svg.querySelector("#axisLayer").setAttribute("transform", "");
    svg.querySelector("#gridLayer").setAttribute("transform", "");



/* Buttons */
document.getElementById("zoom-in").onclick = () => {
    const prev = scale;
    const cx = margin.left + innerW/2;
    scale = Math.min(prev * 1.2, 5);
    translateX = cx - (cx - translateX) * (scale / prev);
    applyTransform();
};
document.getElementById("zoom-out").onclick = () => {
    if (scale <= 1) return;
    const prev = scale;
    const cx = margin.left + innerW/2;
    scale = Math.max(prev / 1.2, 1);
    translateX = cx - (cx - translateX) * (scale / prev);
    applyTransform();
};
document.getElementById("zoom-reset").onclick=()=>{scale=1;translateX=0;applyTransform();};

/* Pan */
svg.onmousedown=evt=>{
    if(evt.target.id==="brush")return;
    if(evt.button!==0)return;
    dragging=true;
    dragStartX=evt.clientX-translateX;
};
svg.onmousemove=evt=>{
    if(dragging){
        translateX=evt.clientX-dragStartX;
        applyTransform();
    }
};
svg.onmouseup=()=>dragging=false;
svg.onmouseleave=()=>dragging=false;

/* Wheel zoom */

svg.onwheel = evt => {
    evt.preventDefault();
    return;   // ❗ disable wheel zoom
};


window.onresize=()=> draw();
</script>
</body>
</html>
