<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family:Arial, sans-serif;
  }

  #svg {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
  }

  #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:6px 10px;
      border-radius:4px;
      font-size:12px;
      pointer-events:none;
      display:none;
      max-width:350px;
      line-height:1.3em;
      z-index:100;
  }

  #zoom-controls {
      position:absolute;
      top:10px;
      right:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      z-index:200;
  }
  #zoom-controls button {
      background:white;
      border:1px solid #444;
      border-radius:5px;
      width:32px;
      height:32px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
  }
  #zoom-controls button:hover { background:#e5e5e5; }

  #brush {
      fill:rgba(150,150,150,0.25);
      stroke:#333;
      stroke-dasharray:4;
      pointer-events:none;
  }
</style>
</head>

<body>

<div id="zoom-controls">
  <button id="zoom-in">＋</button>
  <button id="zoom-out">－</button>
  <button id="zoom-reset">⟲</button>
</div>

<div id="tooltip"></div>
<svg id="svg"></svg>

<script>
let DATA = null;
let selected = new Set();

/* Brush zoom */
let brushActive = false;
let brushStartX = 0;
let brushRect = null;

/* Pan + Zoom */
let scale = 1;
let translateX = 0;
let dragging = false;
let dragStartX = 0;

/* Receive from SAC loader */
window.addEventListener("message", evt => {
    if(evt.data?.type === "update"){
        DATA = evt.data.payload;
        draw();
    }
});

const svg = document.getElementById("svg");
const tip = document.getElementById("tooltip");

/* ============================================================
   DRAW (v3.4.3-COMPACT)
============================================================ */
function draw(){
    if(!DATA) return;

    const W = svg.clientWidth;
    const H = svg.clientHeight;

    svg.innerHTML = `<g id="viewport"></g>`;
    const root = svg.querySelector("#viewport");

    scale = 1;
    translateX = 0;
    root.setAttribute("transform","translate(0,0) scale(1,1)");

    const margin = {top:60,right:80,bottom:160,left:200};
    const innerW = Math.max(600, W - margin.left - margin.right);
    const innerH = H - margin.top - margin.bottom;

    /* Dataset */
    const rows = DATA.project.map((p,i)=>({
        name:p,
        cat:DATA.category[i],
        abate:Number(DATA.abatement[i])||0,
        mac:Number(DATA.mac[i])||0,
        cum:Number(DATA.cumulative[i])||0,
        npv:Number(DATA.npv[i])||0,
        capex:Number(DATA.capex[i])||0,
        opex:Number(DATA.opex[i])||0
    }));

    const clean = rows.filter(r=>Number.isFinite(r.abate)&&Number.isFinite(r.mac));
    if(!clean.length) return;

    clean.sort((a,b)=>a.mac - b.mac);

    let totalAb = clean.reduce((s,r)=>s+r.abate,0);

    /*x0/x1 based on true proportional abatement*/
    let cum = 0;
    clean.forEach(r=>{
        r.x0 = cum;
        cum += r.abate;
        r.x1 = cum;
    });

    /* compress horizontally by scaling factor - dynamic */
    const scaleX = innerW / totalAb;

    const x = v => margin.left + v * scaleX;

    /* Color */
    const macColor=v=>{
        if(v<=-1000) return "#238b45";
        if(v<= -500) return "#74c476";
        if(v<0)      return "#bae4b3";
        if(v<= 500) return "#fee391";
        if(v<=1500) return "#fdae6b";
        if(v<=3000) return "#fd8d3c";
        return "#e31a1c";
    };

    /* Y scale */
    let minMAC=Math.min(...clean.map(r=>r.mac));
    let maxMAC=Math.max(...clean.map(r=>r.mac));
    const PAD=(maxMAC-minMAC)*0.15;
    minMAC-=PAD; maxMAC+=PAD;

    const y = val => margin.top + (1-(val-minMAC)/(maxMAC-minMAC))*innerH;
    const y0 = y(0);

    /* Gridlines */
    const yTicks=6, xTicks=6;

    for(let i=0;i<=yTicks;i++){
        const v=minMAC+(i/yTicks)*(maxMAC-minMAC);
        const ypos=y(v);
        const gl=document.createElementNS(svg.namespaceURI,"line");
        gl.setAttribute("x1",margin.left);
        gl.setAttribute("x2",margin.left+innerW);
        gl.setAttribute("y1",ypos);
        gl.setAttribute("y2",ypos);
        gl.setAttribute("stroke","#ddd");
        root.appendChild(gl);
    }

    for(let i=0;i<=xTicks;i++){
        const v=(i/xTicks)*totalAb;
        const xpos=x(v);
        const gl=document.createElementNS(svg.namespaceURI,"line");
        gl.setAttribute("x1",xpos);
        gl.setAttribute("x2",xpos);
        gl.setAttribute("y1",margin.top);
        gl.setAttribute("y2",margin.top+innerH);
        gl.setAttribute("stroke","#eee");
        root.appendChild(gl);
    }

    /* Zero MAC line */
    const zl=document.createElementNS(svg.namespaceURI,"line");
    zl.setAttribute("x1",margin.left);
    zl.setAttribute("x2",margin.left+innerW);
    zl.setAttribute("y1",y0);
    zl.setAttribute("y2",y0);
    zl.setAttribute("stroke","#0044aa");
    zl.setAttribute("stroke-width","1.5");
    root.appendChild(zl);

    /* Draw bars (C2 compact) */
    clean.forEach(d=>{
        const barWidth = Math.max(4, (d.x1 - d.x0) * scaleX); // C2 minimum width = 4px

        const rect=document.createElementNS(svg.namespaceURI,"rect");
        rect.setAttribute("x",x(d.x0));
        rect.setAttribute("width",barWidth);
        rect.setAttribute("y", d.mac>=0 ? y(d.mac) : y0);
        rect.setAttribute("height", Math.abs(y(d.mac)-y0));
        rect.setAttribute("fill",macColor(d.mac));
        rect.setAttribute("stroke",selected.has(d.name)?"black":"#333");
        rect.setAttribute("stroke-width",selected.has(d.name)?"3":"1.2");
        rect.style.cursor="pointer";

        const html=`
<b>${d.name}</b><br>
Category: ${d.cat}<br>
MAC: ${d.mac}<br>
Abatement: ${d.abate}<br>
Cumulative: ${d.cum}<br>
NPV: ${d.npv}<br>
Capex: ${d.capex}<br>
Opex: ${d.opex}
        `;
        rect.onmouseover=()=>{tip.style.display="block"; tip.innerHTML=html;};
        rect.onmouseout =()=> tip.style.display="none";
        rect.onmousemove=evt=>{
            let tx=evt.clientX+15, ty=evt.clientY-20;
            if(tx+tip.offsetWidth>window.innerWidth-10)
                tx=evt.clientX-tip.offsetWidth-15;
            if(ty<10) ty=evt.clientY+20;
            tip.style.left=tx+"px";
            tip.style.top=ty+"px";
        };

        rect.onclick=()=>{
            if(selected.has(d.name)){
                selected.delete(d.name);
                rect.setAttribute("stroke","#333");
                rect.setAttribute("stroke-width","1.2");
            } else {
                selected.add(d.name);
                rect.setAttribute("stroke","black");
                rect.setAttribute("stroke-width","3");
            }

            parent.postMessage({
                type:"bar_click",
                selectedMembers:Array.from(selected).map(x=>({id:x}))
            },"*");
        };

        root.appendChild(rect);
    });

    /* Axis labels */
    const xlab=document.createElementNS(svg.namespaceURI,"text");
    xlab.textContent="Total Abatement (tCO₂e)";
    xlab.setAttribute("x", margin.left + innerW/2 );
    xlab.setAttribute("y", H-50);
    xlab.setAttribute("text-anchor","middle");
    xlab.setAttribute("font-size","18");
    root.appendChild(xlab);

    const ylab=document.createElementNS(svg.namespaceURI,"text");
    ylab.textContent="MAC (EUR/tCO₂e)";
    ylab.setAttribute("transform","rotate(-90)");
    ylab.setAttribute("x",-H/2);
    ylab.setAttribute("y",60);
    ylab.setAttribute("text-anchor","middle");
    ylab.setAttribute("font-size","18");
    root.appendChild(ylab);

    /* ---------------------------
       Brush zoom (camera style)
    ----------------------------*/
    svg.onmousedown=evt=>{
        if(evt.target.tagName==="rect" || evt.target.tagName==="text") return;
        brushActive=true;
        brushStartX=evt.offsetX;

        brushRect=document.createElementNS(svg.namespaceURI,"rect");
        brushRect.id="brush";
        brushRect.setAttribute("x",brushStartX);
        brushRect.setAttribute("y",margin.top);
        brushRect.setAttribute("width",0);
        brushRect.setAttribute("height",innerH);
        svg.appendChild(brushRect);
    };

    svg.onmousemove=evt=>{
        if(!brushActive) return;
        const cx=evt.offsetX;
        if(cx<brushStartX){
            brushRect.setAttribute("width",0);
            return;
        }
        brushRect.setAttribute("width",cx-brushStartX);
    };

    svg.onmouseup=evt=>{
        if(!brushActive) return;
        brushActive=false;

        const end=evt.offsetX;
        svg.removeChild(brushRect);

        if(end<=brushStartX+10) return;

        const pxMin=brushStartX;
        const pxMax=end;

        const xMin = (pxMin - margin.left)/scaleX;
        const xMax = (pxMax - margin.left)/scaleX;

        const inRange = clean.filter(d=> d.x1>=xMin && d.x0<=xMax);
        if(!inRange.length){ draw(); return; }

        /* Auto-fit Y */
        minMAC=Math.min(...inRange.map(d=>d.mac));
        maxMAC=Math.max(...inRange.map(d=>d.mac));
        minMAC-=PAD; maxMAC+=PAD;

        /* Camera zoom */
        const pxRange = pxMax - pxMin;
        const z = innerW / pxRange;

        scale = z;
        translateX = -pxMin*z + margin.left;
        applyTransform();
    };

    /* Double-click reset */
    svg.ondblclick=()=>{
        scale=1;
        translateX=0;
        applyTransform();
    };
}

/* Transform apply */
function applyTransform(){
    const root=svg.querySelector("#viewport");
    root.setAttribute("transform",
        `translate(${translateX},0) scale(${scale},1)`);
}

/* Buttons */
document.getElementById("zoom-in").onclick=()=>{scale=Math.min(scale+0.2,5);applyTransform();};
document.getElementById("zoom-out").onclick=()=>{scale=Math.max(scale-0.2,0.3);applyTransform();};
document.getElementById("zoom-reset").onclick=()=>{scale=1;translateX=0;applyTransform();};

/* Pan */
svg.onmousedown=evt=>{
    if(brushActive) return;
    if(evt.target.id==="brush") return;
    if(evt.button!==0) return;
    dragging=true;
    dragStartX=evt.clientX-translateX;
};
svg.onmousemove=evt=>{
    if(dragging){
        translateX=evt.clientX-dragStartX;
        applyTransform();
    }
};
svg.onmouseup =()=> dragging=false;
svg.onmouseleave=()=> dragging=false;

/* Wheel zoom */
svg.onwheel=evt=>{
    evt.preventDefault();
    scale+= evt.deltaY<0 ? 0.2 : -0.2;
    scale=Math.min(Math.max(scale,0.3),5);
    applyTransform();
};

window.onresize=()=> draw();
</script>

</body>
</html>
