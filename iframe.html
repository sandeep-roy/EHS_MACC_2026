<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
  html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family:Arial;
  }

  #svg {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
  }

  #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:6px 10px;
      border-radius:4px;
      font-size:12px;
      pointer-events:none;
      display:none;
      max-width:350px;
      line-height:1.4em;
      z-index:10;
  }
</style>
</head>

<body>

<div id="tooltip"></div>
<svg id="svg"></svg>

<script>
let DATA = null;

/* Receive data from parent SAC widget */
window.addEventListener("message", evt => {
    if (evt.data?.type === "update") {
        DATA = evt.data.payload;
        draw();
    }
});

const svg = document.getElementById("svg");
const tip = document.getElementById("tooltip");


/* ============================================================
   DRAW FUNCTION (v3.0)
============================================================ */
function draw() {
    if (!DATA) return;

    const W = svg.clientWidth  || 800;
    const H = svg.clientHeight || 600;

    svg.innerHTML = '<g id="viewport"></g>';
    const root = svg.querySelector("#viewport");

    const margin = {
        top: 60,
        right: 60,
        bottom: 160,
        left: 200
    };

    const innerW = W - margin.left - margin.right;
    const innerH = H - margin.top - margin.bottom;

    /* Data Sanitization */
    const ds = DATA.project.map((p, i) => ({
        name: p,
        cat: DATA.category[i],
        abate: Number(DATA.abatement[i]) || 0,
        mac: Number(DATA.mac[i]) || 0,
        cum: Number(DATA.cumulative[i]) || 0,
        npv: Number(DATA.npv[i]) || 0,
        capex: Number(DATA.capex[i]) || 0,
        opex: Number(DATA.opex[i]) || 0
    }));

    const clean = ds.filter(d =>
        Number.isFinite(d.mac) && Number.isFinite(d.abate)
    );

    if (clean.length === 0) return;

    clean.sort((a,b)=> a.mac - b.mac);

    let cum = 0;
    clean.forEach(d => {
        d.x0 = cum;
        cum += d.abate;
        d.x1 = cum;
    });

    if (cum <= 0) return;

    const x = v => margin.left + (v / cum) * innerW;

    function macColor(v){
        if (v <= -1000) return "#238b45";
        if (v <= -500)  return "#74c476";
        if (v < 0)      return "#bae4b3";
        if (v <= 500)   return "#fee391";
        if (v <= 1500)  return "#fdae6b";
        if (v <= 3000)  return "#fd8d3c";
        return "#e31a1c";
    }

    const vals = clean.map(d => d.mac);
    let max = Math.max(...vals);
    let min = Math.min(...vals);

    const PAD = (max - min) * 0.15;
    max += PAD;
    min -= PAD;

    const y = val =>
        margin.top + (1 - (val - min) / (max - min)) * innerH;

    const y0 = y(0);

    /* Zero Line */
    const zero = document.createElementNS(svg.namespaceURI,"line");
    zero.setAttribute("x1", margin.left);
    zero.setAttribute("x2", W-margin.right);
    zero.setAttribute("y1", y0);
    zero.setAttribute("y2", y0);
    zero.setAttribute("stroke","#0044aa");
    zero.setAttribute("stroke-dasharray","4,4");
    zero.setAttribute("stroke-width","1.5");
    root.appendChild(zero);

    /* Target Line */
    const TARGET = 60000;
    if (TARGET < cum){
        const tx = x(TARGET);

        const tline = document.createElementNS(svg.namespaceURI,"line");
        tline.setAttribute("x1", tx);
        tline.setAttribute("x2", tx);
        tline.setAttribute("y1", margin.top);
        tline.setAttribute("y2", H-margin.bottom);
        tline.setAttribute("stroke","black");
        tline.setAttribute("stroke-dasharray","6,6");
        tline.setAttribute("stroke-width","2");
        root.appendChild(tline);

        const lbl = document.createElementNS(svg.namespaceURI,"text");
        lbl.textContent = "Target: 60,000 tCO₂e";
        lbl.setAttribute("x", tx + 8);
        lbl.setAttribute("y", margin.top - 18);
        lbl.setAttribute("font-size","14");
        root.appendChild(lbl);
    }

    /* Bars */
    clean.forEach(d => {
        const rect = document.createElementNS(svg.namespaceURI,"rect");

        const bw = Math.max(8, x(d.abate)-x(0));
        rect.setAttribute("x", x(d.x0));
        rect.setAttribute("width", bw);
        rect.setAttribute("y", d.mac >= 0 ? y(d.mac) : y0);
        rect.setAttribute("height", Math.abs(y(d.mac) - y0));
        rect.setAttribute("fill", macColor(d.mac));
        rect.setAttribute("stroke", "#333");
        rect.setAttribute("stroke-width", "1.2");

        rect.style.cursor = "pointer";

        rect.addEventListener("mouseover", evt => {
            tip.style.display = "block";
            tip.innerHTML =
                "<b>" + d.name + "</b><br>" +
                "Category: " + d.cat + "<br>" +
                "MAC: " + d.mac + "<br>" +
                "Abatement: " + d.abate + "<br>" +
                "Cumulative: " + d.cum + "<br>" +
                "NPV: " + d.npv + "<br>" +
                "Capex: " + d.capex + "<br>" +
                "Opex: " + d.opex;
        });

        /* Smart tooltip placement */
        rect.addEventListener("mousemove", evt => {
            let x = evt.pageX + 15;
            let y = evt.pageY - 20;

            const tipWidth = tip.offsetWidth;
            const tipHeight = tip.offsetHeight;

            if (x + tipWidth > window.innerWidth - 10) {
                x = evt.pageX - tipWidth - 15;
            }

            if (y < 10) {
                y = evt.pageY + 20;
            }

            tip.style.left = x + "px";
            tip.style.top = y + "px";
        });

        rect.addEventListener("mouseout", () => tip.style.display = "none");

        rect.addEventListener("click", () => {
            parent.postMessage({ type:"bar_click", label:d.name }, "*");
        });

        root.appendChild(rect);
    });

    /* Axis Labels */
    const xlab = document.createElementNS(svg.namespaceURI,"text");
    xlab.textContent = "Total Abatement (tCO₂e)";
    xlab.setAttribute("x", W/2);
    xlab.setAttribute("y", H-50);
    xlab.setAttribute("text-anchor","middle");
    xlab.setAttribute("font-size","18");
    root.appendChild(xlab);

    const ylab = document.createElementNS(svg.namespaceURI,"text");
    ylab.textContent = "MAC (EUR/tCO₂e)";
    ylab.setAttribute("transform","rotate(-90)");
    ylab.setAttribute("x", -H/2);
    ylab.setAttribute("y", 60);
    ylab.setAttribute("text-anchor","middle");
    ylab.setAttribute("font-size","18");
    root.appendChild(ylab);
}


/* ============================================================
   ZOOM + PAN (v3.0)
============================================================ */

let scale = 1;
let translateX = 0;
let isDragging = false;
let startX = 0;

svg.addEventListener("wheel", evt => {
    evt.preventDefault();

    const intensity = 0.1;
    scale += evt.deltaY < 0 ? intensity : -intensity;
    scale = Math.min(Math.max(scale, 0.3), 5);

    const root = svg.querySelector("#viewport");
    root.setAttribute("transform", `translate(${translateX},0) scale(${scale})`);
});

svg.addEventListener("mousedown", evt => {
    isDragging = true;
    startX = evt.clientX - translateX;
});

svg.addEventListener("mousemove", evt => {
    if (isDragging) {
        translateX = evt.clientX - startX;
        const root = svg.querySelector("#viewport");
        root.setAttribute("transform", `translate(${translateX},0) scale(${scale})`);
    }
});

svg.addEventListener("mouseup", () => isDragging = false);
svg.addEventListener("mouseleave", () => isDragging = false);

window.addEventListener("resize", draw);
</script>

</body>
</html>
