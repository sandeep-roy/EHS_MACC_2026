<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
  html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family:Arial;
  }

  /* Scrollable container */
  #scroll-container {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      overflow-x:auto;
      overflow-y:hidden;
      background:white;
  }

  /* SVG inside scroll container */
  #svg {
      position:relative;
      min-width:2000px; /* forces scroll bar */
      height:100%;
  }

  #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:6px 10px;
      border-radius:4px;
      font-size:12px;
      pointer-events:none;
      display:none;
      max-width:350px;
      z-index:100;
  }

  #zoom-controls {
      position:absolute;
      top:10px;
      right:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      z-index:200;
  }

  #zoom-controls button {
      background:white;
      border:1px solid #444;
      border-radius:5px;
      width:32px;
      height:32px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
  }
  #zoom-controls button:hover { background:#e5e5e5; }

</style>
</head>

<body>

<div id="zoom-controls">
  <button id="zoom-in">＋</button>
  <button id="zoom-out">－</button>
  <button id="zoom-reset">⟲</button>
</div>

<div id="tooltip"></div>

<div id="scroll-container">
   <svg id="svg"></svg>
</div>

<script>
let DATA = null;
let selected = new Set();

window.addEventListener("message", evt => {
    if (evt.data?.type === "update") {
        DATA = evt.data.payload;
        draw();
    }
});

const svg = document.getElementById("svg");
const tip = document.getElementById("tooltip");

/* ============================================================
   DRAW FUNCTION (v3.4)
============================================================ */
function draw() {

    if (!DATA) return;

    const W = svg.clientWidth  || 2000; 
    const H = svg.clientHeight || 600;

    svg.innerHTML = '<g id="viewport"></g>';
    const root = svg.querySelector("#viewport");

    const margin = { top:60, right:80, bottom:160, left:200 };
    const innerW = W - margin.left - margin.right;
    const innerH = H - margin.top - margin.bottom;

    /* Sanitize dataset */
    const ds = DATA.project.map((p, i) => ({
        name: p,
        cat: DATA.category[i],
        abate: Number(DATA.abatement[i]) || 0,
        mac: Number(DATA.mac[i]) || 0,
        cum: Number(DATA.cumulative[i]) || 0,
        npv: Number(DATA.npv[i]) || 0,
        capex: Number(DATA.capex[i]) || 0,
        opex: Number(DATA.opex[i]) || 0
    }));

    const clean = ds.filter(d =>
        Number.isFinite(d.mac) && Number.isFinite(d.abate)
    );

    if (clean.length === 0) return;

    clean.sort((a,b)=> a.mac - b.mac);

    let total = 0;
    clean.forEach(d => {
        d.x0 = total;
        total += d.abate;
        d.x1 = total;
    });

    const x = v => margin.left + (v / total) * innerW;

    function macColor(v){
        if (v <= -1000) return "#238b45";
        if (v <= -500)  return "#74c476";
        if (v < 0)      return "#bae4b3";
        if (v <= 500)   return "#fee391";
        if (v <= 1500)  return "#fdae6b";
        if (v <= 3000)  return "#fd8d3c";
        return "#e31a1c";
    }

    const vals = clean.map(d => d.mac);
    let max = Math.max(...vals);
    let min = Math.min(...vals);

    const PAD = (max - min) * 0.15;
    max += PAD; 
    min -= PAD;

    const y = val =>
        margin.top + (1 - (val - min) / (max - min)) * innerH;

    const y0 = y(0);

    /* ---------------------------------------------------------
       GRID LINES (BACKGROUND)
    --------------------------------------------------------- */
    const yTicks = 6;
    const xTicks = 6;

    for (let i = 0; i <= yTicks; i++) {
        const v = min + (i / yTicks) * (max - min);
        const yPos = y(v);

        const g = document.createElementNS(svg.namespaceURI,"line");
        g.setAttribute("x1", margin.left);
        g.setAttribute("x2", margin.left + innerW);
        g.setAttribute("y1", yPos);
        g.setAttribute("y2", yPos);
        g.setAttribute("stroke", "#ddd");
        g.setAttribute("stroke-width", "1");
        root.appendChild(g);
    }

    for (let i = 0; i <= xTicks; i++) {
        const v = (i / xTicks) * total;
        const xPos = x(v);

        const g = document.createElementNS(svg.namespaceURI,"line");
        g.setAttribute("x1", xPos);
        g.setAttribute("x2", xPos);
        g.setAttribute("y1", margin.top);
        g.setAttribute("y2", margin.top + innerH);
        g.setAttribute("stroke", "#eee");
        g.setAttribute("stroke-width","1");
        root.appendChild(g);
    }

    /* Zero MAC line */
    const zl = document.createElementNS(svg.namespaceURI,"line");
    zl.setAttribute("x1", margin.left);
    zl.setAttribute("x2", margin.left + innerW);
    zl.setAttribute("y1", y0);
    zl.setAttribute("y2", y0);
    zl.setAttribute("stroke","#0044aa");
    zl.setAttribute("stroke-width","1.5");
    root.appendChild(zl);

    /* Target line */
    const TARGET = 60000;
    if (TARGET < total){
        const tx = x(TARGET);

        const tl = document.createElementNS(svg.namespaceURI,"line");
        tl.setAttribute("x1", tx);
        tl.setAttribute("x2", tx);
        tl.setAttribute("y1", margin.top);
        tl.setAttribute("y2", margin.top + innerH);
        tl.setAttribute("stroke","black");
        tl.setAttribute("stroke-width","2");
        tl.setAttribute("stroke-dasharray","6,4");
        root.appendChild(tl);

        const lbl = document.createElementNS(svg.namespaceURI,"text");
        lbl.textContent = "Target: 60,000 tCO₂e";
        lbl.setAttribute("x", tx + 10);
        lbl.setAttribute("y", margin.top - 18);
        lbl.setAttribute("font-size","14");
        root.appendChild(lbl);
    }

    /* ---------------------------------------------------------
       Y-AXIS TICKS
    --------------------------------------------------------- */
    for (let i = 0; i <= yTicks; i++) {
        const v = min + (i / yTicks) * (max - min);
        const yPos = y(v);

        const t = document.createElementNS(svg.namespaceURI,"line");
        t.setAttribute("x1", margin.left - 6);
        t.setAttribute("x2", margin.left);
        t.setAttribute("y1", yPos);
        t.setAttribute("y2", yPos);
        t.setAttribute("stroke","#444");
        root.appendChild(t);

        const lb = document.createElementNS(svg.namespaceURI,"text");
        lb.textContent = Math.round(v).toLocaleString();
        lb.setAttribute("x", margin.left - 10);
        lb.setAttribute("y", yPos + 5);
        lb.setAttribute("text-anchor","end");
        lb.setAttribute("font-size","14");
        root.appendChild(lb);
    }

    /* ---------------------------------------------------------
       X-AXIS TICKS
    --------------------------------------------------------- */
    for (let i = 0; i <= xTicks; i++) {
        const v = (i / xTicks) * total;
        const xPos = x(v);

        const t = document.createElementNS(svg.namespaceURI,"line");
        t.setAttribute("x1", xPos);
        t.setAttribute("x2", xPos);
        t.setAttribute("y1", y0);
        t.setAttribute("y2", y0 + 8);
        t.setAttribute("stroke","#444");
        root.appendChild(t);

        const lb = document.createElementNS(svg.namespaceURI,"text");
        lb.textContent = v.toLocaleString() + " tCO₂e";
        lb.setAttribute("x", xPos);
        lb.setAttribute("y", y0 + 24);
        lb.setAttribute("text-anchor","middle");
        lb.setAttribute("font-size","14");
        root.appendChild(lb);
    }

    /* ---------------------------------------------------------
       MULTI-SELECT BAR CLICK
    --------------------------------------------------------- */
    function toggleSelect(d, rect){
        if (selected.has(d.name)) {
            selected.delete(d.name);
            rect.setAttribute("stroke","#333");
            rect.setAttribute("stroke-width","1.2");
        } else {
            selected.add(d.name);
            rect.setAttribute("stroke","black");
            rect.setAttribute("stroke-width","3");
        }

        parent.postMessage({
            type: "bar_click",
            selectedMembers: Array.from(selected).map(x => ({ id: x }))
        },"*");
    }

    /* Bars */
    clean.forEach(d => {

        const rect = document.createElementNS(svg.namespaceURI,"rect");

        rect.setAttribute("x", x(d.x0));
        rect.setAttribute("width", Math.max(8, x(d.abate)-x(0)));
        rect.setAttribute("y", d.mac >= 0 ? y(d.mac) : y0);
        rect.setAttribute("height", Math.abs(y(d.mac) - y0));
        rect.setAttribute("fill", macColor(d.mac));
        rect.setAttribute("stroke", selected.has(d.name) ? "black" : "#333");
        rect.setAttribute("stroke-width", selected.has(d.name) ? "3" : "1.2");
        rect.style.cursor = "pointer";

        /* Tooltip */
        const txt =
            "<b>" + d.name + "</b><br>" +
            "Category: " + d.cat + "<br>" +
            "MAC: " + d.mac + "<br>" +
            "Abatement: " + d.abate + "<br>" +
            "Cumulative: " + d.cum +"<br>" +
            "NPV: "+ d.npv +"<br>" +
            "Capex: "+ d.capex +"<br>" +
            "Opex: "+ d.opex;

        rect.addEventListener("mouseover", () => { tip.style.display="block"; tip.innerHTML=txt; });
        rect.addEventListener("mouseout",  () => tip.style.display="none");

        rect.addEventListener("mousemove", evt => {
            let tx = evt.pageX + 15;
            let ty = evt.pageY - 20;

            if (tx + tip.offsetWidth > window.innerWidth - 10)
                tx = evt.pageX - tip.offsetWidth - 15;

            if (ty < 10)
                ty = evt.pageY + 20;

            tip.style.left = tx+"px";
            tip.style.top  = ty+"px";
        });

        rect.addEventListener("click", () => toggleSelect(d, rect));

        root.appendChild(rect);
    });

    /* Axis labels */
    const xlab = document.createElementNS(svg.namespaceURI,"text");
    xlab.textContent = "Total Abatement (tCO₂e)";
    xlab.setAttribute("x", margin.left + innerW/2);
    xlab.setAttribute("y", H - 50);
    xlab.setAttribute("text-anchor","middle");
    xlab.setAttribute("font-size","18");
    root.appendChild(xlab);

    const ylab = document.createElementNS(svg.namespaceURI,"text");
    ylab.textContent = "MAC (EUR/tCO₂e)";
    ylab.setAttribute("transform","rotate(-90)");
    ylab.setAttribute("x", -H/2);
    ylab.setAttribute("y", 60);
    ylab.setAttribute("text-anchor","middle");
    ylab.setAttribute("font-size","18");
    root.appendChild(ylab);
}

/* ===================================================================
   ZOOM + PAN (still fully supported)
=================================================================== */

let scale = 1;
let translateX = 0;
let isDragging = false;
let startX = 0;

function applyTransform(){
    const root = svg.querySelector("#viewport");
    root.setAttribute("transform", `translate(${translateX},0) scale(${scale})`);
}

svg.addEventListener("wheel", evt => {
    evt.preventDefault();
    scale += evt.deltaY < 0 ? 0.2 : -0.2;
    scale = Math.min(Math.max(scale, 0.3), 5);
    applyTransform();
});

svg.addEventListener("mousedown", evt => {
    isDragging = true;
    startX = evt.clientX - translateX;
});

svg.addEventListener("mousemove", evt => {
    if (isDragging) {
        translateX = evt.clientX - startX;
        applyTransform();
    }
});

svg.addEventListener("mouseup",   ()=> isDragging=false);
svg.addEventListener("mouseleave",()=> isDragging=false);

/* Zoom buttons */
document.getElementById("zoom-in").onclick = () => { scale = Math.min(scale + 0.2, 5); applyTransform(); };
document.getElementById("zoom-out").onclick = () => { scale = Math.max(scale - 0.2, 0.3); applyTransform(); };
document.getElementById("zoom-reset").onclick = () => { scale = 1; translateX = 0; applyTransform(); };

window.addEventListener("resize", draw);
</script>

</body>
</html>
